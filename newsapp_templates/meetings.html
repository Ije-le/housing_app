<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meetings | Housing Minutes Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="shell detail-shell">
    <a class="back-link" href="{{ url_for('index') }}">Back to dashboard</a>

    <section class="card hero detail-hero">
      <div>
        <p class="eyebrow">Meeting archive</p>
        <h1>Browse the source meetings</h1>
        <p class="lead">Open a meeting to read the extracted comments, reports, decisions, and issue links tied to that date.</p>
      </div>
    </section>

    <section class="card section-panel">
      <div class="meeting-list">
        {% for meeting in meetings %}
          <a class="meeting-card" href="{{ url_for('meeting_detail', slug=meeting.slug) }}">
            <div>
              <strong>{{ meeting.date }}</strong>
              <span>{{ meeting.filename }}</span>
            </div>
            <p>{{ meeting.summary }}</p>
          </a>
        {% endfor %}
      </div>
    </section>
  </main>
</body>
</html>
